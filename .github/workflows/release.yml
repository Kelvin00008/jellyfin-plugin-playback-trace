name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build plugin
        run: dotnet publish Jellyfin.Plugin.PlaybackTrace/Jellyfin.Plugin.PlaybackTrace.csproj -c Release -o dist/PlaybackTrace

      - name: Package plugin
        id: package
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}.0"
          ZIP="jellyfin-plugin-playback-trace-${VERSION}.zip"
          (cd dist && zip -r "../${ZIP}" PlaybackTrace)
          CHECKSUM="$(md5sum "${ZIP}" | awk '{print $1}')"
          SOURCE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "source_url=${SOURCE_URL}" >> "$GITHUB_OUTPUT"

      - name: Update manifest on default branch
        shell: bash
        run: |
          set -euo pipefail
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout "${DEFAULT_BRANCH}"
          python3 scripts/write_manifest.py \
            --version "${{ steps.package.outputs.version }}" \
            --checksum "${{ steps.package.outputs.checksum }}" \
            --source-url "${{ steps.package.outputs.source_url }}" \
            --output manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest for ${GITHUB_REF_NAME}" || exit 0
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" "${{ steps.package.outputs.zip }}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Initial Playback Trace build with watched segment tracking and HTML export."

